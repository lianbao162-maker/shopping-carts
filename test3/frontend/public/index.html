<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopHub Account Entry</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="entry-page">
    <section class="entry-shell">
      <header class="entry-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <h1>ShopHub</h1>
        </div>
        <p>Choose your account path before entering the ShopHub page.</p>
      </header>

      <div class="entry-choice-row">
        <button id="choose-customer" type="button" class="entry-choice-btn">Register as Customer</button>
        <button id="choose-customer-login" type="button" class="entry-choice-btn">Login as Customer</button>
        <button id="choose-admin" type="button" class="entry-choice-btn">Login as Admin</button>
      </div>

      <section id="customer-entry" class="entry-panel">
        <h2>Customer Registration</h2>
        <form id="customer-register-form" class="auth-form">
          <input id="customer-name" type="text" placeholder="Your Name" required>
          <input id="customer-email" type="email" placeholder="Email" required>
          <input id="customer-password" type="password" placeholder="Password" minlength="6" required>
          <button type="submit">Create Customer Account</button>
        </form>
      </section>

      <section id="customer-login-entry" class="entry-panel" style="display: none;">
        <h2>Customer Login</h2>
        <form id="customer-login-form" class="auth-form">
          <input id="customer-login-email" type="email" placeholder="Customer Email" required>
          <input id="customer-login-password" type="password" placeholder="Password" required>
          <button type="submit">Login as Customer</button>
        </form>
      </section>

      <section id="admin-entry" class="entry-panel" style="display: none;">
        <h2>Admin Login</h2>
        <form id="admin-login-form" class="auth-form">
          <input id="admin-email" type="email" placeholder="Admin Email" required>
          <input id="admin-password" type="password" placeholder="Admin Password" required>
          <button type="submit">Login as Admin</button>
        </form>
        <p class="entry-hint">Default admin: admin@shophub.local / admin123456</p>
      </section>

      <p id="landing-status" class="auth-status">Select an option to continue.</p>
      <div class="entry-link-row">
        <a href="./shop.html">Already signed in? Enter ShopHub</a>
      </div>
    </section>
  </main>

  <script type="module" src="./js/landing.js"></script>
</body>
</html>
