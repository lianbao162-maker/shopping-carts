<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopHub</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <h1>ShopHub</h1>
      </div>
      <div class="header-actions">
        <input id="product-search" class="search-input" type="text" placeholder="Search products...">
        <span id="cart-toggle" class="cart-toggle">🛒 View Cart</span>
      </div>
    </div>
  </header>

  <section class="auth-section">
    <div class="auth-card">
      <h3>Account</h3>
      <div id="user-auth" class="user-auth" style="display: none;">
        <p id="current-user-label"></p>
        <button id="logout-btn" type="button">Logout</button>
      </div>

      <section id="profile-section" class="profile-section" style="display: none;">
        <h4>User Profile</h4>

        <form id="profile-form" class="profile-form">
          <label for="profile-name">Name</label>
          <input id="profile-name" type="text" required>

          <label for="profile-email">Email</label>
          <input id="profile-email" type="email" required>

          <button type="submit">Save Profile</button>
        </form>

        <form id="password-form" class="profile-form password-form">
          <h5>Change Password</h5>

          <label for="current-password">Current Password</label>
          <input id="current-password" type="password" required>

          <label for="new-password">New Password</label>
          <input id="new-password" type="password" minlength="6" required>

          <label for="confirm-password">Confirm New Password</label>
          <input id="confirm-password" type="password" minlength="6" required>

          <button type="submit">Update Password</button>
        </form>
      </section>

      <p id="auth-status" class="auth-status">Loading account...</p>
    </div>
  </section>

  <div class="container">
    <div id="products" class="products"></div>
    <div id="cart" class="cart">
      <h2>🛒 Shopping Cart</h2>
      <div id="cart-empty" class="cart-empty">
        <p>Your cart is empty</p>
        <p class="cart-empty-hint">Add items to get started!</p>
      </div>
      <ul id="cart-items" class="cart-items"></ul>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total:</span>
          <span class="total-price">A$<span id="total">0.00</span></span>
        </div>
        <button id="checkout-btn" class="checkout-btn">Checkout (A$0.00)</button>
      </div>

      <section id="admin-panel" class="admin-panel" style="display: none;">
        <h3>Admin: All User Carts</h3>
        <button id="refresh-admin-carts-btn" type="button">Refresh All Carts</button>
        <div id="admin-carts-output" class="admin-carts-output">
          <p class="admin-empty">No data loaded.</p>
        </div>
      </section>
    </div>
  </div>

  <div id="productModal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div class="modal-body">
        <div class="modal-image-container">
          <img id="modalProductImage" src="" alt="Product Image" class="modal-image">
        </div>
        <div class="modal-details">
          <h2 id="modalProductName"></h2>
          <p id="modalProductDescription"></p>
          <p class="modal-price">Price: A$<span id="modalProductPrice"></span></p>
          <p class="modal-stock">Stock: <span id="modalProductStock"></span></p>
          <button id="modalAddToCart" class="modal-add-btn">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
