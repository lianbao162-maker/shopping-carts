<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-commerce Shopping Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <h1>ShopHub</h1>
      </div>
      <div class="header-actions">
        <span class="cart-toggle" onclick="toggleCartView()">🛒 View Cart</span>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="products" class="products"></div>
    <div id="cart" class="cart">
      <h2>🛒 Shopping Cart</h2>
      <div id="cart-empty" class="cart-empty">
        <p>Your cart is empty</p>
        <p class="cart-empty-hint">Add items to get started!</p>
      </div>
      <ul id="cart-items" class="cart-items"></ul>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total:</span>
          <span class="total-price">A$<span id="total">0.00</span></span>
        </div>
        <button id="checkout-btn" class="checkout-btn" onclick="checkout()">Checkout (A$0.00)</button>
      </div>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div id="productModal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div class="modal-body">
        <div class="modal-image-container">
          <img id="modalProductImage" src="" alt="Product Image" class="modal-image">
        </div>
        <div class="modal-details">
          <h2 id="modalProductName"></h2>
          <p id="modalProductDescription"></p>
          <p class="modal-price">Price: A$<span id="modalProductPrice"></span></p>
          <p class="modal-stock">Stock: <span id="modalProductStock"></span></p>
          <button id="modalAddToCart" class="modal-add-btn">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
